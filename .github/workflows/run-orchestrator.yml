name: Run AI Software Company
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  run:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aicompany
          POSTGRES_PASSWORD: password
          POSTGRES_DB: project_state
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: python -m orchestrator.main --trigger weekly_review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: postgresql://aicompany:password@localhost:5432/project_state
          REDIS_URL: redis://localhost:6379
